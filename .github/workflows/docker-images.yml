# Much inspired from https://docs.github.com/en/actions/publishing-packages/publishing-docker-images
name: Create and publish Zino API Docker image

on:
  release:
    types:
      - published
      - edited
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to (re)build, e.g. 2.5.1. Defaults to the latest release."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Determine release tag to build
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="$RELEASE_TAG"
          elif [ -n "$INPUT_VERSION" ]; then
            tag="$INPUT_VERSION"
          else
            tag=$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName)
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          tags: |
            type=semver,pattern={{version}},value=${{ steps.release.outputs.tag }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
