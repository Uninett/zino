name: Run test suite

###########################################################
# Start the job on pushes to master and all pull requests #
###########################################################
on:
  push:
    branches: master
    paths-ignore:
      - 'docs/**'
      - 'changelog.d/*'
      - 'README.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'changelog.d/*'
      - 'README.md'
  schedule: # Run daily at 08:00 CEST (06:00 UST)
    - cron: '0 6 * * *'

###############
# Set the Job #
###############
jobs:
  tests:
    # Name the Job
    name: "Test on Python ${{ matrix.python-version}}"
    # Set the agent to run on
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 4
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Disable shallow clone for improved SonarCloud analysis

      - name: Cache
        uses: actions/cache@v6
        id: cache
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-


      - name: "Set up Python ${{ matrix.python-version }}"
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install tox tox-gh-actions coverage
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends snmp libsnmp-dev

      - name: Test with tox
        run: tox

      - name: Upload test reports (${{ matrix.python-version }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reports-${{ matrix.python-version }}
          path: |
            reports/**/*

      - name: Upload coverage reports to Codecov
        if: github.repository_owner == 'Uninett'
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
